// PWA Manifest injection
const manifest = {
  name: "Booster Killer",
  short_name: "BoosterKiller",
  description: "Ethical Hacking Course Tracker",
  start_url: "./",
  display: "standalone",
  background_color: "#0a0a0f",
  theme_color: "#00ff88",
  orientation: "portrait-primary",
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%230a0a0f'/%3E%3Ctext x='96' y='130' font-size='120' text-anchor='middle' fill='%2300ff88'%3E💀%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%230a0a0f'/%3E%3Ctext x='256' y='360' font-size='320' text-anchor='middle' fill='%2300ff88'%3E💀%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const url = URL.createObjectURL(blob);
document.getElementById('manifest-placeholder').setAttribute('href', url);

// Service Worker for offline support
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE = 'booster-killer-v2';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll([self.location.href])).then(()=>self.skipWaiting()));
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(()=>r)));
    });
  `;
  const swBlob = new Blob([sw], {type:'text/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>

const TOTAL_TOPICS = PHASES.flatMap(p=>p.topics).length;
const SK = "booster_killer_v1";

function loadState() {
  try { const r=localStorage.getItem(SK); return r?JSON.parse(r):null; } catch{return null;}
}
function saveState(d) { try{localStorage.setItem(SK,JSON.stringify(d));}catch{} }
function defaultState() {
  return { studentName:"", startDate:new Date().toISOString().split("T")[0], completed:{}, attendance:{}, dailyLogs:{} };
}

const MOOD = ["😴","😟","😐","🙂","🔥"];
const today = new Date().toISOString().split("T")[0];

  const timerRef = useRef(null);
  const isMobile = window.innerWidth < 768;

  useEffect(()=>{ saveState(state); },[state]);

  useEffect(()=>{
    window.addEventListener('beforeinstallprompt', e=>{
      e.preventDefault(); setDeferredPrompt(e); setShowInstall(true);
    });
  },[]);

  useEffect(()=>{
    if(timer.running){
      timerRef.current=setInterval(()=>setTimer(t=>({...t,seconds:t.seconds+1})),1000);
    } else { clearInterval(timerRef.current); }
    return ()=>clearInterval(timerRef.current);
  },[timer.running]);

  const totalXP = Object.keys(state.completed).reduce((s,id)=>{
    const t=PHASES.flatMap(p=>p.topics).find(t=>t.id===id);
    return s+(t?t.xp:0);
  },0);
  const completedCount = Object.keys(state.completed).length;
  const overallPct = Math.round((completedCount/TOTAL_TOPICS)*100);
  const level = Math.floor(totalXP/100)+1;
  const levelXP = totalXP%100;
  const attendanceDays = Object.keys(state.attendance).length;

  const streak = (()=>{
    let s=0, d=new Date();
    while(true){
      const k=d.toISOString().split("T")[0];
      if(state.attendance[k]){s++;d.setDate(d.getDate()-1);}else break;
    }
    return s;
  })();

  const totalTheory = Object.values(state.attendance).reduce((s,a)=>s+(a.theory||0),0);
  const totalLab = Object.values(state.attendance).reduce((s,a)=>s+(a.lab||0),0);
  const totalNotes = Object.values(state.attendance).reduce((s,a)=>s+(a.notes||0),0);

    setState(prev=>{
      const completed={...prev.completed};
      if(completed[id]) delete completed[id];
      else { completed[id]=true; setXpAnim(true); setTimeout(()=>setXpAnim(false),800); }
      return {...prev,completed};
    });
  }

    setState(prev=>({
      ...prev,
      attendance:{...prev.attendance,[today]:{theory:todayLog.theory,lab:todayLog.lab,notes:todayLog.notes,mood:todayLog.mood,entry:todayLog.entry,ts:new Date().toISOString()}},
      dailyLogs:{...prev.dailyLogs,[today]:todayLog.entry}
    }));
    setShowCheckin(false);
  }

  function fmtTime(s){
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
    return h>0?`${h}:${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`:
               `${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`;
  }

    const mins=Math.round(timer.seconds/60);
    setTodayLog(prev=>({...prev,[timer.type]:(prev[timer.type]||0)+mins}));
    setTimer({running:false,seconds:0,type:timer.type});
    setShowCheckin(true);

              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={s.label}>COURSE COMPLETION</span>
                <span style={{fontSize:11,color:"#00ff88",fontFamily:"Orbitron,monospace"}}>{overallPct}%</span>
              </div>
              {s.bar(overallPct,"linear-gradient(90deg,#00ff88,#3b82f6)")}
              <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
                {PHASES.map(p=><span key={p.id} style={{fontSize:isMobile?12:14,opacity:phasePct(p)>0?1:0.3}}>{p.icon}</span>)}
              </div>
            </div>

            {/* Time stats */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
              {[
                {label:"THEORY",val:totalTheory,color:"#3b82f6",icon:"📚"},
                {label:"LAB",val:totalLab,color:"#00ff88",icon:"⚡"},
                {label:"NOTES",val:totalNotes,color:"#f59e0b",icon:"✏️"},
              ].map(st=>(
                <div key={st.label} style={{...s.card,textAlign:"center",borderColor:st.color+"22"}}>
                  <div style={{fontSize:20,marginBottom:4}}>{st.icon}</div>
                  <div style={{...s.orb(isMobile?14:18,st.color)}}>{Math.floor(st.val/60)}h {st.val%60}m</div>
                  <div style={{...s.label,marginTop:4}}>{st.label}</div>
                </div>
              ))}
            </div>

            {/* Phase cards */}
            <div style={s.label}>PHASES</div>
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:10,marginTop:10}}>
              {PHASES.map(phase=>{
                const pct=phasePct(phase);
                const done=phase.topics.filter(t=>state.completed[t.id]).length;
                return (
                  <div key={phase.id} onClick={()=>{setSelPhase(phase.id);setView("phases");}}
                    style={{...s.card,borderColor:pct===100?phase.color:"#1e2a1e",cursor:"pointer",transition:"all 0.2s"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <span style={{fontSize:20}}>{phase.icon}</span>
                      <span style={{...s.orb(11,pct>0?phase.color:"#2d4a2d")}}>{pct}%</span>
                    </div>
                    <div style={{fontSize:10,color:pct>0?phase.color:"#4a5568",fontWeight:700,marginBottom:4}}>Ph.{phase.id}</div>
                    <div style={{fontSize:9,color:"#4a5568",marginBottom:8,lineHeight:1.4}}>{phase.title}</div>
                    {s.bar(pct,phase.color)}
                    <div style={{fontSize:9,color:"#2d4a2d",marginTop:6}}>{done}/{phase.topics.length}</div>
                  </div>
                );
              })}
            </div>

            {/* Recent logs */}
            {Object.keys(state.dailyLogs).length>0 && (
              <div style={{marginTop:16}}>
                <div style={s.label}>RECENT ACTIVITY</div>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:10}}>
                  {Object.entries(state.dailyLogs).slice(-3).reverse().map(([date,log])=>(
                    <div key={date} style={{...s.card,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                      <span style={{...s.orb(11,"#00ff88"),minWidth:90}}>{date}</span>
                      <span style={{fontSize:11,color:"#a0aec0",flex:1}}>{log||"No entry"}</span>
                      {state.attendance[date] && (
                        <div style={{display:"flex",gap:10,fontSize:10,color:"#4a5568"}}>
                          <span>📚{state.attendance[date].theory}m</span>
                          <span>⚡{state.attendance[date].lab}m</span>
                          <span>{MOOD[(state.attendance[date].mood||3)-1]}</span>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* PHASES VIEW */}
        {view==="phases" && (
          <div className="fade-in">
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
              {PHASES.map(p=>(
                <button key={p.id} onClick={()=>setSelPhase(p.id)}
                  style={{...s.btn(selPhase===p.id?p.color:"#2d4a2d",selPhase===p.id?p.color+"11":"transparent"),padding:"6px 12px"}}>
                  {p.icon} {isMobile?`P${p.id}`:p.id}
                </button>
              ))}
            </div>
            {PHASES.filter(p=>p.id===selPhase).map(phase=>{
              const pct=phasePct(phase);
              const done=phase.topics.filter(t=>state.completed[t.id]).length;
              const phXP=phase.topics.reduce((s,t)=>s+(state.completed[t.id]?t.xp:0),0);
              const maxXP=phase.topics.reduce((s,t)=>s+t.xp,0);
              return (
                <div key={phase.id}>
                  <div style={{...s.card,borderColor:phase.color+"44",marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <span style={{fontSize:32}}>{phase.icon}</span>
                        <div>
                          <div style={{...s.orb(16,phase.color)}}>Phase {phase.id}</div>
                          <div style={{fontSize:12,color:"#a0aec0",marginTop:2}}>{phase.title}</div>
                          <div style={{display:"flex",gap:12,fontSize:10,color:"#4a5568",marginTop:6,flexWrap:"wrap"}}>
                            <span>⏱{phase.weeks}wk</span><span>📚{phase.theory}m/day</span><span>⚡{phase.lab}m/day</span>
                          </div>
                        </div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{...s.orb(30,phase.color)}}>{pct}%</div>
                        <div style={{fontSize:10,color:"#4a5568"}}>{done}/{phase.topics.length} • {phXP}/{maxXP}XP</div>
                      </div>
                    </div>
                    <div style={{marginTop:12}}>{s.bar(pct,phase.color)}</div>
                  </div>

                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {phase.topics.map((topic)=>{
                      const isDone=state.completed[topic.id];
                      return (
                        <div key={topic.id} onClick={()=>toggleTopic(topic.id)}
                          style={{background:isDone?phase.color+"0a":"#0d1117",border:`1px solid ${isDone?phase.color+"44":"#1e2a1e"}`,borderRadius:6,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",transition:"all 0.2s"}}>
                          <div style={{width:20,height:20,borderRadius:3,border:`2px solid ${isDone?phase.color:"#1e3a1e"}`,background:isDone?phase.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#0a0a0f",fontWeight:900,flexShrink:0}}>
                            {isDone?"✓":""}
                          </div>
                          <div style={{flex:1,fontSize:isMobile?11:13,color:isDone?"#6b7280":"#e2e8f0",textDecoration:isDone?"line-through":"none"}}>{topic.title}</div>
                          <span style={{fontSize:9,padding:"2px 7px",borderRadius:2,background:topic.type==="lab"?"rgba(0,255,136,0.1)":"rgba(59,130,246,0.1)",color:topic.type==="lab"?"#00ff88":"#3b82f6",border:`1px solid ${topic.type==="lab"?"#00ff8833":"#3b82f633"}`,whiteSpace:"nowrap"}}>{topic.type.toUpperCase()}</span>
                          <span style={{...s.orb(11,isDone?phase.color:"#2d4a2d"),minWidth:32,textAlign:"right"}}>+{topic.xp}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ATTENDANCE VIEW */}
        {view==="attendance" && (
          <div className="fade-in">
            <div style={{...s.orb(16,"#00ff88"),marginBottom:16}}>ATTENDANCE SYSTEM</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
              {[
                {label:"TOTAL DAYS",value:attendanceDays,color:"#00ff88"},
                {label:"STREAK",value:`${streak}🔥`,color:"#f59e0b"},
                {label:"RATE",value:(()=>{
                  if(!state.startDate) return "0%";
                  const days=Math.max(1,Math.floor((new Date()-new Date(state.startDate))/86400000)+1);
                  return Math.round((attendanceDays/days)*100)+"%";
                })(),color:"#3b82f6"},
              ].map(st=>(
                <div key={st.label} style={{...s.card,textAlign:"center",borderColor:st.color+"33"}}>
                  <div style={{...s.orb(isMobile?20:28,st.color)}}>{st.value}</div>
                  <div style={{...s.label,marginTop:6}}>{st.label}</div>
                </div>
              ))}
            </div>

            {/* Heatmap */}
            <div style={{...s.card,marginBottom:16}}>
              <div style={{...s.label,marginBottom:12}}>ACTIVITY — LAST 10 WEEKS</div>
              <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                {Array.from({length:70},(_,i)=>{
                  const d=new Date(); d.setDate(d.getDate()-(69-i));
                  const k=d.toISOString().split("T")[0];
                  const att=state.attendance[k];
                  const intensity=att?Math.min(1,(att.theory+att.lab+att.notes)/105):0;
                  return <div key={k} title={k} style={{width:isMobile?12:16,height:isMobile?12:16,borderRadius:2,background:att?`rgba(0,255,136,${0.15+intensity*0.85})`:"#1a1a2e",border:k===today?"1px solid #00ff88":"1px solid transparent"}}/>;
                })}
              </div>
            </div>

            {/* Time targets */}
            <div style={{...s.card,marginBottom:16}}>
              <div style={{...s.label,marginBottom:12}}>DAILY AVG vs TARGET</div>
              {[
                {label:"📚 Theory",target:30,actual:Math.round(totalTheory/Math.max(1,attendanceDays)),color:"#3b82f6"},
                {label:"⚡ Lab",target:60,actual:Math.round(totalLab/Math.max(1,attendanceDays)),color:"#00ff88"},
                {label:"✏️ Notes",target:15,actual:Math.round(totalNotes/Math.max(1,attendanceDays)),color:"#f59e0b"},
              ].map(st=>(
                <div key={st.label} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontSize:12,color:st.color}}>{st.label}</span>
                    <span style={{fontSize:11,color:"#4a5568"}}>{st.actual}/{st.target} min avg</span>
                  </div>
                  {s.bar(Math.min(100,(st.actual/st.target)*100),st.color)}
                </div>
              ))}
            </div>

            {/* Log list */}
            <div style={s.label}>SESSION LOG</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:10}}>
              {Object.entries(state.attendance).length===0
                ?<div style={{...s.card,textAlign:"center",color:"#2d4a2d",padding:40}}>No sessions yet. Hit CHECK-IN to start!</div>
                :Object.entries(state.attendance).reverse().map(([date,att])=>(
                  <div key={date} style={{...s.card,flexWrap:"wrap",gap:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                      <span style={{...s.orb(12,"#00ff88")}}>{date}</span>
                      <span style={{fontSize:18}}>{MOOD[(att.mood||3)-1]}</span>
                    </div>
                    <div style={{display:"flex",gap:16,fontSize:11,marginTop:8,flexWrap:"wrap"}}>
                      <span style={{color:"#3b82f6"}}>📚{att.theory}m</span>
                      <span style={{color:"#00ff88"}}>⚡{att.lab}m</span>
                      <span style={{color:"#f59e0b"}}>✏️{att.notes}m</span>
                      <span style={{color:"#4a5568"}}>Total:{att.theory+att.lab+att.notes}m</span>
                    </div>
                    {att.entry&&<div style={{fontSize:11,color:"#6b7280",marginTop:6,borderTop:"1px solid #1e2a1e",paddingTop:6}}>{att.entry}</div>}
                  </div>
                ))
              }
            </div>
          </div>
        )}

        {/* TIMER VIEW */}
        {view==="timer" && (
          <div className="fade-in" style={{maxWidth:500,margin:"0 auto"}}>
            <div style={{...s.orb(16,"#00ff88"),marginBottom:20,textAlign:"center"}}>STUDY TIMER</div>
            <div className={timer.running?"timer-glow":""} style={{...s.card,borderColor:timer.running?"#00ff88":"#1e2a1e",textAlign:"center",padding:32,marginBottom:16}}>
              <div style={{...s.orb(isMobile?52:72,timer.running?"#00ff88":"#4a5568"),letterSpacing:4,marginBottom:8}}>{fmtTime(timer.seconds)}</div>
              <div style={{...s.label}}>{timer.running?`▶ TRACKING: ${timer.type.toUpperCase()}`:"READY"}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
              {[
                {id:"theory",label:"📚 THEORY",target:"30m/day",color:"#3b82f6"},
                {id:"lab",label:"⚡ LAB",target:"60m/day",color:"#00ff88"},
                {id:"notes",label:"✏️ NOTES",target:"15m/day",color:"#f59e0b"},
              ].map(t=>(
                <button key={t.id} disabled={timer.running} onClick={()=>setTimer(prev=>({...prev,type:t.id}))}
                  style={{...s.btn(timer.type===t.id?t.color:"#2d4a2d",timer.type===t.id?t.color+"11":"transparent"),padding:14,opacity:timer.running?0.5:1}}>
                  <div style={{fontWeight:700}}>{t.label}</div>
                  <div style={{fontSize:9,opacity:0.7,marginTop:4}}>{t.target}</div>
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:10,marginBottom:16}}>
              {!timer.running
                ?<button onClick={()=>setTimer(t=>({...t,running:true}))} style={{flex:1,padding:16,background:"#00ff88",color:"#0a0a0f",border:"none",borderRadius:6,fontFamily:"Orbitron,monospace",fontSize:16,fontWeight:900,cursor:"pointer"}}>▶ START</button>
                :<>
                  <button onClick={()=>setTimer(t=>({...t,running:false}))} style={{flex:1,padding:14,background:"#f59e0b",color:"#0a0a0f",border:"none",borderRadius:6,fontFamily:"Orbitron,monospace",fontSize:14,fontWeight:900,cursor:"pointer"}}>⏸ PAUSE</button>
                  <button onClick={stopTimer} style={{flex:1,padding:14,background:"#3b82f6",color:"#fff",border:"none",borderRadius:6,fontFamily:"Orbitron,monospace",fontSize:14,fontWeight:900,cursor:"pointer"}}>⏹ STOP+LOG</button>
                </>
              }
              {!timer.running&&timer.seconds>0&&<button onClick={()=>setTimer({running:false,seconds:0,type:timer.type})} style={{padding:14,background:"transparent",color:"#ef4444",border:"1px solid #ef444455",borderRadius:6,cursor:"pointer",fontSize:16}}>✕</button>}
            </div>
            <div style={{...s.card}}>
              <div style={{...s.label,marginBottom:12}}>TODAY'S LOGGED TIME</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                {[
                  {label:"Theory",val:todayLog.theory,target:30,color:"#3b82f6"},
                  {label:"Lab",val:todayLog.lab,target:60,color:"#00ff88"},
                  {label:"Notes",val:todayLog.notes,target:15,color:"#f59e0b"},
                ].map(st=>{
                  const pct=Math.min(100,(st.val/st.target)*100);
                  return (
                    <div key={st.label} style={{textAlign:"center"}}>
                      <div style={{...s.orb(18,pct>=100?st.color:"#4a5568")}}>{st.val}m</div>
                      <div style={{fontSize:9,color:"#4a5568",margin:"4px 0"}}>{st.label}/{st.target}m</div>
                      {s.bar(pct,st.color)}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* LOGS VIEW */}
        {view==="logs" && (
          <div className="fade-in">
            <div style={{...s.orb(16,"#00ff88"),marginBottom:16}}>DAILY LOGS</div>
            {Object.keys(state.dailyLogs).length===0
              ?<div style={{...s.card,textAlign:"center",color:"#2d4a2d",padding:60}}>No logs yet. Check in daily to build your log!</div>
              :<div style={{display:"flex",flexDirection:"column",gap:12}}>
                {Object.entries(state.dailyLogs).reverse().map(([date,entry])=>{
                  const att=state.attendance[date];
                  return (
                    <div key={date} style={{...s.card}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
                        <span style={{...s.orb(13,"#00ff88")}}>{date}</span>
                        {att&&<div style={{display:"flex",gap:12,fontSize:11,flexWrap:"wrap"}}>
                          <span style={{color:"#3b82f6"}}>📚{att.theory}m</span>
                          <span style={{color:"#00ff88"}}>⚡{att.lab}m</span>
                          <span style={{color:"#f59e0b"}}>✏️{att.notes}m</span>
                          <span style={{fontSize:18}}>{MOOD[(att.mood||3)-1]}</span>
                        </div>}
                      </div>
                      <div style={{fontSize:12,color:"#a0aec0",lineHeight:1.7,whiteSpace:"pre-wrap",borderTop:"1px solid #1e2a1e",paddingTop:10}}>
                        {entry||<span style={{color:"#2d4a2d"}}>No notes this day.</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            }
          </div>
        )}
      </div>

      {/* Mobile bottom nav */}
      {isMobile && (
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0d0d17",borderTop:"1px solid #1a2a1a",display:"flex",zIndex:50}}>
          {navItems.map(n=>(
            <button key={n.id} onClick={()=>setView(n.id)} style={{flex:1,padding:"10px 4px",background:"transparent",border:"none",color:view===n.id?"#00ff88":"#2d4a2d",fontSize:9,fontFamily:"Orbitron,monospace",letterSpacing:0.5,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:16}}>{n.icon}</span>
              {n.label}
            </button>
          ))}
        </div>
      )}

      {/* CHECK-IN MODAL */}
      {showCheckin && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:12}}>
          <div style={{background:"#0d1117",border:"1px solid #00ff88",borderRadius:12,padding:isMobile?20:28,width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{...s.orb(13,"#00ff88"),marginBottom:20}}>💀 BOOSTER KILLER // CHECK-IN // {today}</div>

            <div style={{...s.label,marginBottom:10}}>TIME SPENT (minutes)</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}}>
              {[
                {key:"theory",label:"📚 Theory",target:30,color:"#3b82f6"},
                {key:"lab",label:"⚡ Lab",target:60,color:"#00ff88"},
                {key:"notes",label:"✏️ Notes",target:15,color:"#f59e0b"},
              ].map(f=>(
                <div key={f.key}>
                  <div style={{fontSize:10,color:f.color,marginBottom:6}}>{f.label}<br/><span style={{color:"#4a5568"}}>target:{f.target}m</span></div>
                  <input type="number" min={0} max={300} value={todayLog[f.key]}
                    onChange={e=>setTodayLog(prev=>({...prev,[f.key]:parseInt(e.target.value)||0}))}
                    style={{width:"100%",background:"#0a0a0f",border:`1px solid ${f.color}44`,color:f.color,padding:"10px 8px",borderRadius:4,fontFamily:"Orbitron,monospace",fontSize:18,fontWeight:900,textAlign:"center"}}/>
                </div>
              ))}
            </div>

            <div style={{...s.label,marginBottom:10}}>MOOD / ENERGY</div>
            <div style={{display:"flex",gap:8,marginBottom:18}}>
              {MOOD.map((emoji,i)=>(
                <button key={i} onClick={()=>setTodayLog(prev=>({...prev,mood:i+1}))}
                  style={{flex:1,fontSize:22,background:todayLog.mood===i+1?"rgba(0,255,136,0.15)":"transparent",border:`1px solid ${todayLog.mood===i+1?"#00ff88":"#1e3a1e"}`,borderRadius:6,padding:"8px 4px",cursor:"pointer"}}>
                  {emoji}
                </button>
              ))}
            </div>

            <div style={{...s.label,marginBottom:8}}>WHAT DID YOU LEARN?</div>
            <textarea rows={4} value={todayLog.entry} onChange={e=>setTodayLog(prev=>({...prev,entry:e.target.value}))}
              placeholder="Today I learned... practiced... struggled with... tomorrow I'll..."
              style={{width:"100%",background:"#0a0a0f",border:"1px solid #1e3a1e",color:"#e2e8f0",padding:12,borderRadius:4,fontFamily:"inherit",fontSize:12,resize:"vertical",lineHeight:1.7,marginBottom:16}}/>

            <div style={{display:"flex",gap:10}}>
              <button onClick={checkin} style={{flex:1,padding:14,background:"#00ff88",color:"#0a0a0f",border:"none",borderRadius:6,fontFamily:"Orbitron,monospace",fontSize:14,fontWeight:900,cursor:"pointer"}}>✓ SAVE</button>
              <button onClick={()=>setShowCheckin(false)} style={{padding:14,background:"transparent",color:"#4a5568",border:"1px solid #1e3a1e",borderRadius:6,cursor:"pointer",fontSize:14}}>✕</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
